<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom, #ff758c, #ff7eb3);
        color: white;
        text-align: center;
        overflow-x: hidden; /* SOLO horizontal bloqueado */
    }

    .container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 30px 20px;
    }

    h1 {
        font-size: 2.2em;
    }

    p {
        font-size: 1.2em;
        max-width: 500px;
        line-height: 1.6;
    }

    button {
        margin-top: 25px;
        padding: 14px 28px;
        font-size: 1em;
        border: none;
        border-radius: 30px;
        background: white;
        color: #ff4d6d;
        cursor: pointer;
    }

    .corazones {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
        overflow: hidden;
    }

    .corazones span {
        position: absolute;
        animation: subir 10s linear infinite;
        font-size: 20px;
    }

    @keyframes subir {
        0% { transform: translateY(100vh); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-10vh); opacity: 0; }
    }

    .flores {
        font-size: 4em;
        margin-top: 20px;
        animation: flotar 3s infinite;
    }

    @keyframes flotar {
        0% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="corazones">
    <span style="left:10%">💖</span>
    <span style="left:30%">💗</span>
    <span style="left:50%">💓</span>
    <span style="left:70%">💞</span>
    <span style="left:90%">💕</span>
</div>

<div class="container">
    <h1>Para ti… 💖</h1>

    <p>
        No supe cómo decir todo esto de frente…<br><br>

        pero hay algo en mí que todavía te piensa,<br>
        que todavía te extraña,<br>
        y que no ha dejado de creer en nosotros.<br><br>

        No busco presionarte,<br>
        solo quería que supieras<br>
        que lo que siento… sigue siendo real.
    </p>

    <div class="flores">🌹🌹🌹</div>

    <button onclick="playMusic()">Escucha esto 🎶</button>
</div>

<audio id="musica" loop>
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    const audio = document.getElementById("musica");
    audio.play();
}
</script>

</body>
</html>
